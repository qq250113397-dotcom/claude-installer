<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>输入访问密码 — Claude Code 安装助手</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .unlock-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .unlock-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .unlock-icon { font-size: 2.5rem; margin-bottom: 20px; }
    .unlock-card h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .unlock-card .sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; }
    .unlock-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    .unlock-input:focus { border-color: var(--accent); }
    .unlock-input.err { border-color: #f85149; }
    .unlock-error {
      color: #f85149;
      font-size: 0.85rem;
      min-height: 20px;
      margin-bottom: 14px;
    }
    .unlock-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .unlock-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
<div class="unlock-wrap">
  <div class="unlock-card">
    <div class="unlock-icon">🔐</div>
    <h1>输入访问密码</h1>
    <p class="sub">本教程为付费内容，请输入密码后访问。</p>
    <input type="password" id="pwd" class="unlock-input" placeholder="输入密码" autocomplete="off">
    <div id="pwd-err" class="unlock-error"></div>
    <button class="unlock-btn" id="unlock-btn">进入教程</button>
  </div>
</div>
<script>
  var KEY = 'cc_unlock';
  var CORRECT = 'CLAUDE2024';
  var SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;

  function attempt() {
    var input = document.getElementById('pwd');
    var errEl = document.getElementById('pwd-err');
    if (input.value.trim() === CORRECT) {
      localStorage.setItem(KEY, JSON.stringify({ expiry: Date.now() + SEVEN_DAYS }));
      window.location.href = 'step1.html';
    } else {
      input.classList.add('err');
      errEl.textContent = '密码不正确，请重新输入';
      input.value = '';
      input.focus();
    }
  }

  document.getElementById('unlock-btn').addEventListener('click', attempt);
  document.getElementById('pwd').addEventListener('keydown', function (e) {
    this.classList.remove('err');
    document.getElementById('pwd-err').textContent = '';
    if (e.key === 'Enter') attempt();
  });
</script>
</body>
</html>
