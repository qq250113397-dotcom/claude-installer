<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>输入访问密码 — Claude Code 安装助手</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .unlock-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .unlock-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .unlock-icon { font-size: 2.5rem; margin-bottom: 20px; }
    .unlock-card h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .unlock-card .sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; }
    .unlock-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    .unlock-input:focus { border-color: var(--accent); }
    .unlock-input.err { border-color: #f85149; }
    .unlock-error {
      color: #f85149;
      font-size: 0.85rem;
      min-height: 20px;
      margin-bottom: 14px;
    }
    .unlock-status {
      color: var(--text-muted);
      font-size: 0.82rem;
      min-height: 18px;
      margin: -6px 0 12px;
    }
    .unlock-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .unlock-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
<div class="unlock-wrap">
  <div class="unlock-card">
    <div class="unlock-icon">🔐</div>
    <h1>输入访问卡密</h1>
    <p class="sub">本教程为付费内容，请输入卡密后访问。</p>
    <input type="text" id="pwd" class="unlock-input" placeholder="输入卡密，如 XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
    <div id="pwd-err" class="unlock-error"></div>
    <div id="pwd-status" class="unlock-status"></div>
    <button class="unlock-btn" id="unlock-btn">进入教程</button>
  </div>
</div>
<script src="js/access.js?v=20260601c"></script>
<script>
  function getStoredToken() {
    var rec = window.CC_ACCESS.readRecord();
    return rec && rec.token ? rec.token : null;
  }

  function setLoading(on) {
    var btn = document.getElementById('unlock-btn');
    var status = document.getElementById('pwd-status');
    btn.disabled = on;
    btn.textContent = on ? '验证中…' : '进入教程';
    status.textContent = on ? '正在验证，请稍等…' : '';
  }

  function showError(msg) {
    var input = document.getElementById('pwd');
    var errEl = document.getElementById('pwd-err');
    var status = document.getElementById('pwd-status');
    input.classList.add('err');
    errEl.textContent = msg;
    status.textContent = '';
    input.focus();
  }

  function attempt() {
    var input = document.getElementById('pwd');
    var card = window.CC_ACCESS.normalizeCard(input.value);
    document.getElementById('pwd-err').textContent = '';
    input.classList.remove('err');

    if (!card) {
      showError('请输入卡密');
      return;
    }

    setLoading(true);

    window.CC_ACCESS.verify({ card: card, token: getStoredToken() }, 'activate')
      .then(function (data) {
        setLoading(false);
        if (data.ok) {
          window.CC_ACCESS.writeRecord(card, data);
          window.location.href = 'step1.html';
        } else {
          showError(data.error || '验证失败，请重试');
          input.value = '';
        }
      })
      .catch(function (error) {
        setLoading(false);
        if (error && error.name === 'AbortError') {
          showError('验证超时，请重试一次');
          return;
        }
        showError('网络错误，请检查网络后重试');
      });
  }

  document.getElementById('unlock-btn').addEventListener('click', attempt);
  document.getElementById('pwd').addEventListener('keydown', function (e) {
    this.classList.remove('err');
    document.getElementById('pwd-err').textContent = '';
    if (e.key === 'Enter') attempt();
  });

  (function showRedirectReason() {
    var reason = new URLSearchParams(window.location.search).get('reason');
    var messages = {
      expired: '访问已过期，请重新输入卡密',
      invalid: '访问验证失败，请重新输入卡密',
      network: '网络验证失败，请检查网络后重试'
    };

    if (messages[reason]) {
      showError(messages[reason]);
      window.history.replaceState(null, '', window.location.pathname);
    }
  })();
</script>
</body>
</html>
